<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Travel Logger</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app" data-tab="log">
    <header class="app-header">
      <button class="header-btn header-btn--left" id="back-btn" hidden aria-label="Back">‹</button>
      <h1 class="app-title" id="app-title">Travel Logger</h1>
      <button class="header-btn header-btn--right" id="primary-action" aria-label="Addresses">Addresses</button>
    </header>
    <main class="app-main" id="screen" aria-live="polite"></main>
    <nav class="tab-bar" aria-label="Primary">
      <a href="#/log" class="tab" data-tab="log">
        <span class="tab-icon" aria-hidden="true">●</span>
        <span class="tab-label">Log</span>
      </a>
      <a href="#/predict" class="tab" data-tab="predict">
        <span class="tab-icon" aria-hidden="true">◐</span>
        <span class="tab-label">Predict</span>
      </a>
      <a href="#/history" class="tab" data-tab="history">
        <span class="tab-icon" aria-hidden="true">☰</span>
        <span class="tab-label">History</span>
      </a>
    </nav>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  <script src="/config.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
